version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: grafter_db
    environment:
      POSTGRES_USER: grafter_user
      POSTGRES_PASSWORD: grafter_password
      POSTGRES_DB: grafter_services
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafter_user -d grafter_services"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: grafter_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://grafter_user:grafter_password@postgres:5432/grafter_services
      JWT_SECRET_KEY: development-secret-key-change-in-production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8000
      DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app:asgi --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
